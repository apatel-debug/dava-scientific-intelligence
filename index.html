<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAVA Oncology — Scientific Intelligence Platform</title>
<style>

:root{
  --bg:#f0f3f9; --panel:#ffffff; --panel2:#eef2fa; --line:#d9e0ed;
  --ink:#17233b; --muted:#55647d; --dim:#7c8ba4;
  --brand:#c8102e;           /* J&J red */
  --accent:#2f6fed;          /* action blue */
  --gold:#a9760a;
  --good:#2fb673; --warn:#e6a417; --bad:#e5484d;
  --chip:#eef2fa;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd6e6;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 70% -10%,#e9f0fb 0%,#f0f3f9 60%);z-index:100}
.login-card{width:390px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 32px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.login-card .lock{font-size:12px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;margin-bottom:18px}
.brandmark{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brandmark .dot{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),#7a0a1c);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px}
.brandmark b{font-size:16px;letter-spacing:.02em}
.login-card h1{font-size:19px;margin:20px 0 4px}
.login-card p.sub{color:var(--muted);margin:0 0 22px;font-size:13px}
.login-card label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px}
.login-card input{width:100%;padding:11px 12px;background:#f6f8fd;border:1px solid var(--line);border-radius:8px;color:var(--ink);font-size:14px}
.login-card input:focus{outline:none;border-color:var(--accent)}
.login-card button{width:100%;margin-top:22px;padding:12px;background:var(--accent);border:0;border-radius:8px;color:#fff;font-weight:600;font-size:14px;cursor:pointer}
.login-card button:hover{background:#255fd6}
.login-note{margin-top:16px;font-size:11.5px;color:var(--dim);text-align:center}
.login-hint{margin-top:10px;font-size:11.5px;color:var(--gold);text-align:center;background:#fbf3dd;border:1px solid #efe1b4;border-radius:7px;padding:8px}

/* ---------- APP SHELL ---------- */
#app{display:grid;grid-template-columns:236px 1fr;grid-template-rows:56px 1fr;height:100vh}
header.topbar{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:0 18px;background:linear-gradient(180deg,#f4f7fc,#ffffff);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar .brandmark b{font-size:14px}
.topbar .tenant{font-size:11px;color:var(--dim);border-left:1px solid var(--line);padding-left:14px;margin-left:2px}
.topbar .tenant b{color:var(--ink);font-weight:600}
.searchwrap{flex:1;max-width:640px;position:relative}
.searchwrap input{width:100%;padding:9px 12px 9px 34px;background:#f6f8fd;border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:13px}
.searchwrap input:focus{outline:none;border-color:var(--accent)}
.searchwrap .mag{position:absolute;left:11px;top:9px;color:var(--dim)}
.searchwrap .kbd{position:absolute;right:10px;top:8px;font-size:10px;color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:1px 6px}
.topbar .who{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted)}
.topbar .who .av{width:30px;height:30px;border-radius:50%;background:#46577a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#2a4a86}
.topbar .logout{font-size:11px;color:var(--dim);cursor:pointer;border:1px solid var(--line);padding:5px 9px;border-radius:6px}
.topbar .logout:hover{color:var(--ink)}

/* Search results dropdown */
#searchResults{position:absolute;top:42px;left:0;right:0;background:#ffffff;border:1px solid var(--line);border-radius:10px;max-height:60vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.6);z-index:40}
#searchResults .sr-cat{padding:8px 14px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);background:#f6f8fd;position:sticky;top:0}
#searchResults .sr-item{padding:9px 14px;border-top:1px solid #e6ebf4;cursor:pointer}
#searchResults .sr-item:hover{background:#eef4fd}
#searchResults .sr-item .t{font-size:13px}
#searchResults .sr-item .m{font-size:11.5px;color:var(--muted)}

/* ---------- SIDEBAR ---------- */
nav.side{background:#f7f9fc;border-right:1px solid var(--line);overflow:auto;padding:12px 0}
nav.side .grp{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:14px 20px 6px}
nav.side a.nav{display:flex;align-items:center;gap:11px;padding:9px 20px;color:var(--muted);font-size:13.5px;cursor:pointer;border-left:3px solid transparent}
nav.side a.nav:hover{background:#eef3fb;color:var(--ink)}
nav.side a.nav.active{background:#e6edf8;color:#fff;border-left-color:var(--brand)}
nav.side a.nav .ic{width:17px;text-align:center;opacity:.9}
nav.side a.nav .ct{margin-left:auto;font-size:11px;color:var(--dim);background:#eef2fa;border-radius:20px;padding:1px 8px}
nav.side a.nav.active .ct{color:#2a4a86}

/* ---------- MAIN ---------- */
main{overflow:auto;padding:22px 28px 60px}
.crumb{font-size:12px;color:var(--dim);margin-bottom:14px}
.crumb b{color:var(--muted)}
h2.page{font-size:22px;margin:0 0 3px;letter-spacing:.01em}
.page-sub{color:var(--muted);font-size:13px;margin:0 0 20px;max-width:900px}
.explain{background:#eef4fd;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:10px 14px;color:var(--muted);font-size:12.5px;margin:0 0 20px;max-width:1000px}
.explain b{color:var(--ink)}

.grid{display:grid;gap:16px}
.cards4{grid-template-columns:repeat(4,1fr)}
.cards3{grid-template-columns:repeat(3,1fr)}
.cards2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.cards4{grid-template-columns:repeat(2,1fr)}.cards3{grid-template-columns:1fr 1fr}}

.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h3{margin:0 0 12px;font-size:13px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;font-weight:600}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.kpi .n{font-size:28px;font-weight:700;letter-spacing:-.01em}
.kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
.kpi .d{font-size:11px;margin-top:7px}
.up{color:var(--good)} .down{color:var(--bad)}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--chip);color:var(--muted);border:1px solid #dbe3f0;white-space:nowrap}
.pill.direct{background:#e3f7ec;color:#137a4e;border-color:#bfe8d2}
.pill.competitor{background:#fdeaea;color:#c0343a;border-color:#f3c9cb}
.pill.adjacent{background:#fdf6e3;color:#8a6d12;border-color:#efe1b4}
.pill.context{background:#eef2fa;color:#55647d}
.pill.threat{background:#fdeaea;color:#c0343a;border-color:#f3c9cb}
.pill.opp{background:#e8f1fe;color:#2456b8;border-color:#cfe0fb}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:#eef2fa;color:#2a4a86;margin:0 4px 4px 0;border:1px solid #dbe3f0;cursor:pointer}
.tag:hover{background:#d3dcea}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:9px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
td{padding:10px;border-bottom:1px solid #e6ebf4;vertical-align:top}
tr.click{cursor:pointer}
tr.click:hover td{background:#e9eff8}
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tbl-wrap .tbl-scroll{max-height:none;overflow:auto}

.gauge-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.gauge{position:relative;width:190px;height:190px;flex:none}
.gauge svg{transform:rotate(-90deg)}
.gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .center .big{font-size:44px;font-weight:800;line-height:1}
.gauge .center .of{font-size:13px;color:var(--dim)}
.gauge .center .lab{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.08em;text-transform:uppercase}
.score-break{flex:1;min-width:320px}
.sb-row{display:grid;grid-template-columns:190px 1fr 46px;gap:10px;align-items:center;margin-bottom:9px}
.sb-row .lab{font-size:12.5px;color:var(--muted)}
.sb-row .bar{height:8px;background:#e6edf8;border-radius:6px;overflow:hidden}
.sb-row .bar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#5b8bf0)}
.sb-row .val{font-size:12px;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}

.section-title{font-size:15px;margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.section-title .more{margin-left:auto;font-size:12px;color:var(--accent);cursor:pointer}

.pl-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px;cursor:pointer;transition:.15s}
.pl-card:hover{border-color:#c0cde0;transform:translateY(-2px)}
.pl-card .aud{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.pl-card h4{margin:0 0 6px;font-size:14.5px}
.pl-card p{margin:0;color:var(--muted);font-size:12px}
.pl-card .foot{margin-top:11px;font-size:11.5px;color:var(--dim);display:flex;gap:12px}

.matrix{overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px}
.matrix table{font-size:12px}
.matrix th{background:var(--panel);white-space:nowrap}
.matrix td.cell{text-align:center;cursor:pointer}
.mx{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:24px;border-radius:6px;font-weight:600;font-size:11.5px}
.mx.jnj{background:#e3f7ec;color:#137a4e}
.mx.comp{background:#fdeaea;color:#c0343a}
.mx.some{background:#eef2fa;color:#33507d}
.mx.zero{color:#c2cbdb}
.rowlab{font-weight:600;white-space:nowrap;color:#27395c}

.detail-head{display:flex;gap:18px;align-items:flex-start;margin-bottom:6px}
.logo-badge{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;flex:none}
.back{font-size:12.5px;color:var(--accent);cursor:pointer;margin-bottom:14px;display:inline-block}
.back:hover{text-decoration:underline}
.metabar{display:flex;gap:26px;flex-wrap:wrap;margin:14px 0 8px;padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.metabar .m .n{font-size:20px;font-weight:700}
.metabar .m .l{font-size:11px;color:var(--muted)}

.talk-row .tt{font-size:13.5px;color:var(--ink)}
.talk-row .meta{font-size:11.5px;color:var(--dim);margin-top:3px}
.bm{cursor:pointer;color:var(--dim);font-size:15px}
.bm.on{color:var(--gold)}
.dl{cursor:pointer;color:var(--dim);font-size:14px}
.dl:hover,.bm:hover{color:var(--ink)}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters select,.filters input{background:#f6f8fd;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-size:12.5px}
.filters .clear{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12.5px}

.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:8px 0 14px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.sw{width:12px;height:12px;border-radius:3px;display:inline-block}

.chip-toggle{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:14px}
.chip-toggle button{background:transparent;border:0;color:var(--muted);padding:7px 14px;font-size:12.5px;cursor:pointer}
.chip-toggle button.on{background:var(--accent);color:#fff}

.empty{color:var(--dim);font-size:13px;padding:30px;text-align:center}
.bars-h .b{display:grid;grid-template-columns:150px 1fr 40px;gap:10px;align-items:center;margin-bottom:7px;font-size:12.5px}
.bars-h .b .track{height:16px;background:#e6edf8;border-radius:5px;overflow:hidden}
.bars-h .b .track span{display:block;height:100%}
.footer-note{margin-top:40px;padding-top:16px;border-top:1px solid var(--line);color:var(--dim);font-size:11px;max-width:900px}
.threatbar{display:inline-block;width:44px;height:7px;border-radius:4px;background:#e6edf8;overflow:hidden;vertical-align:middle}
.threatbar span{display:block;height:100%;background:var(--bad)}

/* modal + buttons (unified platform) */
.modal-bg{position:fixed;inset:0;background:rgba(4,9,18,.72);z-index:60;display:flex;align-items:center;justify-content:center;padding:24px}
.mbtn{background:#15263f;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:12.5px}
.mbtn:hover{background:#1d3556}
.mbtn.primary{background:var(--accent);border:0;color:#fff}

/* ===================== UNIFIED PLATFORM ADDITIONS ===================== */
/* Experience theming — one shell, accent swaps by role */
#app.exp-industry{--brand:#c8102e;--accent:#2f6fed;--exp:#2f6fed}
#app.exp-faculty{--brand:#1f9e8b;--accent:#17a2b8;--exp:#2ac2a8}
#app.exp-admin{--brand:#b06be0;--accent:#8a5cf0;--exp:#a98bff}
.topbar .expchip{font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--exp);color:#04121f;font-weight:800}

/* ---- ROLE LANDING ---- */
#login{position:fixed;inset:0;overflow:auto;background:radial-gradient(1400px 700px at 72% -12%,#e9f0fb 0%,#f0f3f9 62%);z-index:100;padding:40px 20px}
.land{max-width:1040px;margin:0 auto}
.land-head{display:flex;align-items:center;gap:13px;margin-bottom:6px}
.land-head .dot{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#2f6fed,#1b3f8f);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
.land h1{font-size:24px;margin:14px 0 4px;color:#17233b}
.land .lede{color:#55647d;font-size:14px;max-width:760px;margin:0 0 6px}
.land .authnote{color:#76859e;font-size:12px;background:#eef4fd;border:1px solid #d9e0ed;border-left:3px solid #2f6fed;border-radius:8px;padding:10px 13px;margin:16px 0 26px;max-width:820px}
.land .authnote b{color:#2a4a86}
.exp-group{margin:22px 0}
.exp-group h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#687892;margin:0 0 12px;display:flex;align-items:center;gap:9px}
.exp-group h2 .bar{height:1px;flex:1;background:#d9e0ed}
.id-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:820px){.id-grid{grid-template-columns:1fr}}
.id-card{background:#ffffff;border:1px solid #d9e0ed;border-radius:12px;padding:15px 16px;cursor:pointer;transition:.15s;position:relative}
.id-card:hover{transform:translateY(-2px);border-color:#c0cde0;box-shadow:0 16px 40px rgba(0,0,0,.4)}
.id-card .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;margin-bottom:10px}
.id-card h3{margin:0 0 2px;font-size:15px;color:#17233b}
.id-card .role{font-size:12px;color:#55647d}
.id-card .org{font-size:11.5px;color:#7c8ba4;margin-top:8px;border-top:1px solid #e9eff8;padding-top:8px}
.id-card .ent{position:absolute;top:14px;right:14px;font-size:11px;color:#8090a8}
.id-card .scope{margin-top:9px;font-size:10.5px;color:#76859e}
.land-foot{color:#8090a8;font-size:11px;text-align:center;margin-top:34px;border-top:1px solid #e9eff8;padding-top:16px}

/* ---- RELEVANCE LABELS (industry, 8) ---- */
.lbl{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:6px;white-space:nowrap;border:1px solid}
.lbl.portfolio{background:#e3f7ec;color:#137a4e;border-color:#bfe8d2}
.lbl.competitor{background:#fdeaea;color:#c0343a;border-color:#f3c9cb}
.lbl.emerging{background:#f6ecfd;color:#8b3fb0;border-color:#e6d0f4}
.lbl.adjacent{background:#fdf6e3;color:#8a6d12;border-color:#efe1b4}
.lbl.biomarker{background:#e8f1fe;color:#2456b8;border-color:#cfe0fb}
.lbl.resistance{background:#f2ecfd;color:#7a3fc0;border-color:#ddd0f4}
.lbl.lifecycle{background:#e3f6f4;color:#12796e;border-color:#bfe8e2}
.lbl.context{background:#eef2fa;color:#55647d;border-color:#d3dcea}
.why{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.45}
.why b{color:#2a3a56}

/* ---- PROVENANCE / editorial ---- */
.prov{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:#1f7a4e;background:#e9f7ef;border:1px solid #c3e6d1;border-radius:5px;padding:1px 7px}
.prov.pending{color:#8a6d12;background:#fbf3dd;border-color:#efe1b4}
.srclink{font-size:11px;color:var(--accent);cursor:pointer}
.srclink:hover{text-decoration:underline}

/* ---- SCIENCE BADGES (faculty) ---- */
.ph{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;letter-spacing:.03em}
.ph.ph3{background:#e3f7ec;color:#137a4e}
.ph.ph2{background:#e8f1fe;color:#2456b8}
.ph.ph12,.ph.ph1{background:#f2ecfd;color:#7a3fc0}
.ph.fih{background:#fdf0dd;color:#a9600a}
.ph.trans{background:#e3f6f4;color:#12796e}
.ph.rwe{background:#eef2fa;color:#55647d}
.ph.review{background:#f5edfa;color:#8b5aa8}
.ev{font-size:10.5px;color:#55647d}
.disease-chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:#e6f6f0;color:#12796e;border:1px solid #bfe8dc;margin:0 5px 5px 0;cursor:pointer}
.disease-chip:hover{background:#d5efe5}
.setting-chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:6px;background:#eef2fa;color:#2a4a86;border:1px solid #dbe3f0;margin:0 4px 4px 0}

/* ---- SCORE DISCLAIMER ---- */
.disc{font-size:11px;color:var(--dim);background:#eef4fd;border:1px dashed #d3dcea;border-radius:8px;padding:10px 13px;margin-top:12px;line-height:1.5}
.disc b{color:var(--muted)}
.count-pop{font-size:10.5px;color:var(--dim)}

/* ---- PERMISSION MATRIX / ADMIN ---- */
.pmx{width:100%;border-collapse:collapse;font-size:12px}
.pmx th{background:var(--panel);color:var(--dim);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:8px 8px;border-bottom:1px solid var(--line);text-align:center}
.pmx td{padding:7px 8px;border-bottom:1px solid #e6ebf4;text-align:center}
.pmx td.role{text-align:left;font-weight:600;color:#27395c;white-space:nowrap}
.yes{color:#137a4e;font-weight:700}
.no{color:#8090a8}
.part{color:#8a6d12;font-weight:700}
.admin-tabs{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:16px;flex-wrap:wrap}
.admin-tabs button{background:transparent;border:0;color:var(--muted);padding:9px 15px;font-size:12.5px;cursor:pointer;border-right:1px solid var(--line)}
.admin-tabs button.on{background:var(--accent);color:#fff}
.q-status{font-size:11px;padding:2px 8px;border-radius:20px}
.q-status.rev{background:#e9f7ef;color:#1f7a4e;border:1px solid #c3e6d1}
.q-status.pend{background:#fbf3dd;color:#8a6d12;border:1px solid #efe1b4}
.q-status.flag{background:#fdeaea;color:#c0343a;border:1px solid #f3c9cb}

/* ---- THEME / HERO cards (faculty homepage) ---- */
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1100px){.hero-grid{grid-template-columns:repeat(2,1fr)}}
.theme-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px;cursor:pointer;transition:.15s}
.theme-card:hover{border-color:var(--exp);transform:translateY(-2px)}
.theme-card .ic{font-size:20px}
.theme-card h4{margin:8px 0 4px;font-size:14px}
.theme-card p{margin:0;font-size:11.5px;color:var(--muted)}
.theme-card .n{font-size:11px;color:var(--dim);margin-top:9px}
.conf-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;background:#eef2fa;border:1px solid #dbe3f0;border-radius:20px;padding:3px 11px;color:var(--muted);cursor:pointer}
.conf-pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ---- light-mode targeted fixes ---- */
nav.side a.nav.active{color:#17233b}
.topbar .who .av{color:#fff}
.brandmark .dot{color:#fff}
.mediatag{background:#eef4fd;color:#3a5c92;border-color:#d3e0f5}
.tag.mediatag:hover{background:#e0ebfb}
::selection{background:#cfe0fb}
::-webkit-scrollbar-thumb{background:#c8d3e6}
.mx.zero{color:#c2cbdb}
.disc{background:#f4f7fd}
input::placeholder{color:#93a1b8}


/* ===================== MOBILE RESPONSIVE LAYOUT ===================== */
@media (max-width: 760px){
  html,body{height:auto;min-height:100%;overflow-x:hidden}
  #app{
    display:grid;
    grid-template-columns:1fr;
    grid-template-rows:auto auto 1fr;
    min-height:100vh;
    height:auto;
  }
  header.topbar{
    grid-column:1;
    position:sticky;
    top:0;
    min-height:56px;
    height:auto;
    padding:8px 10px;
    gap:8px;
    flex-wrap:wrap;
  }
  .topbar .brandmark{margin:0;min-width:0}
  .topbar .brandmark b{font-size:12.5px;white-space:nowrap}
  .topbar .brandmark .dot{width:30px;height:30px;border-radius:8px;font-size:12px}
  .topbar .tenant,.topbar .expchip,.topbar .kbd{display:none}
  .searchwrap{
    order:3;
    flex:0 0 100%;
    max-width:none;
  }
  .searchwrap input{font-size:16px;padding:10px 12px 10px 34px}
  #searchResults{position:fixed;top:104px;left:8px;right:8px;max-height:65vh}
  .topbar .who{margin-left:auto;gap:5px}
  .topbar .who #userInfo{display:none}
  .topbar .who .av{width:28px;height:28px}
  .topbar .logout{font-size:10px;padding:5px 7px}

  nav.side{
    grid-column:1;
    display:flex;
    align-items:center;
    gap:4px;
    padding:7px 8px;
    border-right:0;
    border-bottom:1px solid var(--line);
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    position:sticky;
    top:104px;
    z-index:15;
    -webkit-overflow-scrolling:touch;
  }
  nav.side .grp{display:none}
  nav.side a.nav{
    flex:0 0 auto;
    padding:7px 10px;
    border-left:0;
    border-bottom:2px solid transparent;
    border-radius:8px;
    font-size:12px;
    gap:6px;
  }
  nav.side a.nav.active{border-left:0;border-bottom-color:var(--brand)}
  nav.side a.nav .ct{display:none}

  main{overflow:visible;padding:16px 12px 40px;min-width:0}
  h2.page{font-size:19px;line-height:1.25}
  .page-sub,.explain{font-size:12px}

  .cards4,.cards3,.cards2,.hero-grid{grid-template-columns:1fr!important}
  .grid{gap:11px}
  .card,.kpi,.pl-card,.theme-card{border-radius:10px;padding:13px}
  .kpi .n{font-size:24px}

  .gauge-wrap{display:block}
  .gauge{width:160px;height:160px;margin:0 auto 18px}
  .score-break{min-width:0;width:100%}
  .sb-row{grid-template-columns:minmax(105px,145px) 1fr 38px;gap:7px}

  .filters{gap:6px}
  .filters select,.filters input,.filters .clear{max-width:100%;font-size:12px}
  .chip-toggle{max-width:100%;overflow-x:auto}
  .chip-toggle button{white-space:nowrap;padding:7px 10px}

  .tbl-wrap,.matrix{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl-wrap table,.matrix table{min-width:680px}
  th,td{padding:8px 7px}
  .detail-head{flex-direction:column;gap:10px}
  .metabar{gap:14px}
  .bars-h .b{grid-template-columns:105px 1fr 32px;gap:6px}

  .land{width:100%}
  #login{padding:22px 12px}
  .land h1{font-size:20px}
  .land-head .dot{width:36px;height:36px}
  .id-grid{grid-template-columns:1fr!important}
  .id-card{padding:14px}
  .modal-bg{padding:10px;align-items:flex-start;overflow:auto}
  .modal-bg>div{max-width:100%!important;width:100%!important;margin-top:12px}
}

@media (max-width: 420px){
  .topbar .logout:first-of-type{display:none}
  nav.side a.nav .ic{display:none}
  nav.side a.nav{padding:7px 9px}
  main{padding-left:9px;padding-right:9px}
  .section-title{font-size:14px}
}

</style>

/* ---- science-layer enrichment (rules-based; behind-the-scenes AI would
        propose these, an editor confirms them) ---- */
const PH3_TRIALS=["CROWN","NeoADAURA","DESTINY-Lung02","MARIPOSA","PALOMA-3","PALOMA-2","LIBRETTO-432","TROPION-Lung05","HERTHENA-Lung","IMforte","KRYSTAL-7","RASolute 302","DeLLphi-301","ALKOVE-1","TRUST","Beamion LUNG-1","HARMONi","SUNRAY-01","WU-KONG","eNRGy","REZILIENT","SOHO-01","IDeate-Lung01"];
function enrich(t){
  const s=(t.title+" "+t.s).toLowerCase();
  // disease
  t.disease = /head and neck|hnscc/.test(s)?"HNSCC"
    : /mesothelioma/.test(s)?"Mesothelioma"
    : /neuroendocrine|lcnec|large cell neuro/.test(s)?"Neuroendocrine carcinoma"
    : /adenoid cystic/.test(s)?"Adenoid cystic carcinoma"
    : /sclc|small-cell|small cell/.test(s)?"SCLC"
    : "NSCLC";
  // treatment setting / line
  t.setting = /neoadjuvant/.test(s)?"Neoadjuvant"
    : /perioperative|peri-op/.test(s)?"Perioperative"
    : /adjuvant|resected|consolidation/.test(s)?"Adjuvant / consolidation"
    : /brain met|intracranial|cns|untreated brain/.test(s)?"CNS / brain metastases"
    : /oligometastatic/.test(s)?"Oligometastatic"
    : /newly diagnosed|first-line|frontline|1l|treatment-naive/.test(s)?"First-line"
    : /previously treated|relapsed|refractory|r\/r|pretreated|after |post-|2l|third-line/.test(s)?"Relapsed / refractory"
    : /screening|survivorship|palliat|cachexia|quality of life|rehabilitation/.test(s)?"Supportive / screening"
    : "Advanced / metastatic";
  // evidence level / phase
  const trials=(t.trial||"").split(" / ");
  t.fih = /first-in-human/.test(s);
  t.phase = t.fih ? "FIH"
    : trials.some(x=>PH3_TRIALS.includes(x)) || /phase 3|7-year update|vs\.? docetaxel|randomized/.test(s) ? "Ph3"
    : (t.mod||"").match(/Translational|Biomarker|AI\/ML|Pipeline/) || (t.resist && !t.drugs.length) ? "Translational"
    : /real-world|retrospective|va experience|va system/.test(s) ? "RWE"
    : /perspective|lessons|how to|role of|obsolete|defining|managing|current role|overview|is tnm|rationale|what is the/.test(s) ? "Review"
    : "Ph1/2";
  t.evLabel = {FIH:"First-in-human",Ph3:"Phase III",["Ph1/2"]:"Phase I/II",Translational:"Translational",RWE:"Real-world",Review:"Perspective / education"}[t.phase];
  // clinical questions (curated, keyword-driven)
  const cq=[];
  if(t.tg.includes("EGFR") && (t.resist||/resistance|what comes next|met amp|after |post-/.test(s))) cq.push("What comes after osimertinib?");
  if(t.tg.includes("EGFR") && /exon ?20|atypical|pacc/.test(s)) cq.push("Managing EGFR exon 20 & atypical mutations");
  if(/neoadjuvant|adjuvant|perioperative|resect|peri-op/.test(s)) cq.push("Optimizing (neo)adjuvant & perioperative therapy");
  if(t.cns||/brain|intracranial|cns/.test(s)) cq.push("Controlling CNS / brain metastases");
  if((t.mod||"").includes("ADC")||/antibody-drug|adc|deruxtecan|vedotin|govitecan|tirumotecan/.test(s)) cq.push("Selecting patients for ADCs");
  if(t.tg.some(x=>/KRAS|RAS/.test(x)) && (t.resist||/resistance|overcome/.test(s))) cq.push("Overcoming KRAS inhibitor resistance");
  if(/sequenc|what comes|next line|decide what comes/.test(s)) cq.push("Sequencing targeted therapy");
  if(t.disease==="SCLC" && /frontline|first-line|imforte|maintenance|subtype/.test(s)) cq.push("Frontline & maintenance strategy in SCLC");
  if(/ctdna|mrd|minimal residual/.test(s)) cq.push("ctDNA / MRD-guided decisions");
  if(!cq.length) cq.push("Emerging science & targets");
  t.cq=uniq(cq);
  // editorial provenance (mock; a small % pending to power the admin review demo)
  t.reviewedBy = ["L. Chen, MD","R. Diaz","M. Osei, PhD","S. Kim"][ (t.id.charCodeAt(1)+t.title.length)%4 ];
  t.reviewStatus = (t.title.length%11===0) ? "Pending review" : "Editor-reviewed";
  t.source = "Session record · "+MEETING.name;
  return t;
}

const LABELS = {
  portfolio:"Direct Portfolio Relevance", competitor:"Direct Competitor", emerging:"Emerging Threat",
  adjacent:"Adjacent Strategic Interest", biomarker:"Biomarker Relevance", resistance:"Resistance Biology",
  lifecycle:"Lifecycle Opportunity", context:"General Scientific Context"

function labelChip(key){return `<span class="lbl ${key}">${LABELS[key]}</span>`;}

const _lensCache={};
function lensFor(company){
  if(_lensCache[company]) return _lensCache[company];
  const P = COMPANY_PROFILES[company] || {assets:[],targets:[],adjacent:[]};
  const map={};
  TALKS.forEach(t=>{
    const owns = t.tg.filter(g=>P.targets.includes(g));
    const adj  = t.tg.filter(g=>(P.adjacent||[]).includes(g));
    const ownAsset = t.drugs.filter(d=>P.assets.includes(d));
    const onOwn = owns.length>0;
    const compDrugs = onOwn ? t.drugs.filter(d=>!P.assets.includes(d)) : [];
    const isCompAsset = onOwn && t.drugs.length && ownAsset.length===0;
    const early = t.fih || t.phase==="FIH" || t.phase==="Ph1/2" || /develop|next-gen|next-generation|emerging|early|first-in/i.test(t.title);
    const expansion = ["HNSCC","Mesothelioma","Neuroendocrine carcinoma","Adenoid cystic carcinoma"].includes(t.disease)
      || /Neoadjuvant|Perioperative|Adjuvant/.test(t.setting);
    let key;
    if(ownAsset.length){ key = expansion ? "lifecycle" : "portfolio"; }
    else if(isCompAsset){ key = early ? "emerging" : "competitor"; }
    else if(onOwn && t.resist){ key="resistance"; }
    else if(onOwn && /Biomarker|Translational|AI/.test(t.mod)){ key="biomarker"; }
    else if(onOwn){ key="competitor"; }
    else if((t.resist||/Biomarker|Translational/.test(t.mod)) && adj.length){ key="biomarker"; }
    else if(adj.length){ key="adjacent"; }
    else { key="context"; }
    // threat / priority
    let thr = key==="competitor" ? (t.phase==="Ph3"?3:2) : key==="emerging"?2 : key==="resistance"?1 : 0;
    let pr  = key==="portfolio"?2 : (key==="competitor"&&thr===3)?2 : (key==="lifecycle"||key==="emerging")?1 : (key==="resistance"||key==="biomarker")?1 : 0;
    // rationale (deterministic template referencing real entities)
    const owners = uniq(t.co).filter(c=>c!=="Academic / Investigator"&&c!=="Multiple / Class");
    const share = uniq([...owns,...adj]).join(" / ") || t.tg.join(" / ");
    let why;
    if(key==="portfolio") why = `Features <b>${ownAsset.join(" + ")}</b>${t.trial?` (${t.trial})`:""} — a ${company} asset on ${owns.join(" / ")||"the franchise"}.`;
    else if(key==="lifecycle") why = `Expansion setting — <b>${t.disease}${t.setting?` · ${t.setting}`:""}</b> — for ${company}'s ${ownAsset.join(" + ")||"franchise"}; potential indication/lifecycle growth.`;
    else if(key==="competitor") why = `<b>${t.drugs.join(", ")||"Competing program"}</b>${owners.length?` (${owners.join(", ")})`:""} — competing ${t.mod} on <b>${owns.join(" / ")}</b>, a ${company} target${t.phase==="Ph3"?"; Phase III — high overlap":""}.`;
    else if(key==="emerging") why = `Early-stage <b>${t.drugs.join(", ")||"asset"}</b>${owners.length?` (${owners.join(", ")})`:""} on ${owns.join(" / ")} — ${t.evLabel}; a developing threat to watch.`;
    else if(key==="resistance") why = `Resistance biology on <b>${owns.join(" / ")||share}</b>${t.bm.length?` (${t.bm.join(", ")})`:""} — informs ${company} next-line & combination strategy.`;
    else if(key==="biomarker") why = `Biomarker / translational signal${t.bm.length?` (<b>${t.bm.join(", ")}</b>)`:""} relevant to ${company}'s ${share} programs.`;
    else if(key==="adjacent") why = `<b>${adj.join(" / ")||share}</b> — adjacent strategic interest for ${company} (watch / potential entry).`;
    else why = `General thoracic-oncology science; no direct ${company} portfolio link.`;
    map[t.id]={key,label:LABELS[key],why,thr,pr};
  });
  _lensCache[company]=map;
  return map;
}

/* =====================================================================
   IMPACT SCORE — transparent, rule-based, per company
   ===================================================================== */
function impactFor(company){
  const L=lensFor(company), P=COMPANY_PROFILES[company]||{assets:[],targets:[],adjacent:[]};
  const rel = TALKS.filter(t=>L[t.id].key!=="context");
  const has = k=>TALKS.filter(t=>L[t.id].key===k);
  const directRel = has("portfolio").length + has("lifecycle").length;
  const ownAssets = uniq(TALKS.flatMap(t=>t.drugs).filter(d=>P.assets.includes(d))).length;
  const compAssets = uniq(TALKS.filter(t=>["competitor","emerging"].includes(L[t.id].key)).flatMap(t=>t.drugs)).length;
  const trials = uniq(rel.filter(t=>t.trial).flatMap(t=>t.trial.split(" / "))).length;
  const tgBm = uniq([...rel.flatMap(t=>t.tg).filter(g=>P.targets.includes(g)||(P.adjacent||[]).includes(g)), ...rel.flatMap(t=>t.bm)]).length;
  const resist = has("resistance").length;
  const combos = rel.filter(t=>/Combo|\+|combination|pembrolizumab|durvalumab|lazertinib/i.test(t.mod+" "+t.title)).length;
  const ph23 = rel.filter(t=>t.phase==="Ph3"||t.phase==="Ph1/2").length;
  const kols = uniq(TALKS.filter(t=>["portfolio","lifecycle","competitor","emerging"].includes(L[t.id].key)).map(t=>t.spk)).length;
  const hiPri = TALKS.filter(t=>L[t.id].pr>=2).length;
  const comps=[
    {k:"Direct portfolio relevance",w:.22,raw:directRel,ceil:10,unit:"sessions on your assets"},
    {k:"Competitive pressure",w:.18,raw:has("competitor").length+has("emerging").length,ceil:22,unit:"competitor / emerging talks"},
    {k:"Novel molecules",w:.12,raw:compAssets+ownAssets,ceil:30,unit:"in-scope molecules"},
    {k:"Clinical trials",w:.10,raw:trials,ceil:18,unit:"tracked trials"},
    {k:"Targets & biomarkers",w:.10,raw:tgBm,ceil:20,unit:"targets + biomarkers"},
    {k:"Resistance biology",w:.08,raw:resist,ceil:5,unit:"resistance talks"},
    {k:"Combination strategies",w:.06,raw:combos,ceil:12,unit:"combination talks"},
    {k:"Phase II / III programs",w:.08,raw:ph23,ceil:22,unit:"Ph II/III sessions"},
    {k:"Relevant KOLs",w:.04,raw:kols,ceil:18,unit:"KOLs"},
    {k:"High-priority curated",w:.02,raw:hiPri,ceil:10,unit:"priority items"}
  ];
  let total=0; comps.forEach(c=>{c.pct=Math.min(100,Math.round(c.raw/c.ceil*100));total+=c.pct*c.w;});
  total=Math.round(total);
  const band = total>=85?"Very high":total>=65?"High":total>=45?"Moderate":total>=25?"Low":"Minimal";
  return {total,band,comps,directRel,compCount:has("competitor").length+has("emerging").length,
          novelMol:compAssets+ownAssets,trials,resist,kols,tgBm,ph23,combos,hiPri};
}

function tagLinks(t){

    <div style="max-width:800px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;max-height:90vh;overflow:auto" onclick="event.stopPropagation()">

        <div style="flex:1"><div style="font-size:11px;color:var(--dim)">${t.d} · ${t.t} · ${esc(t.s)}</div>
        <h3 style="margin:5px 0 6px;font-size:17px;color:var(--ink)">${esc(t.title)}</h3>
        <div style="color:var(--muted);font-size:13px">${esc(t.spk)} — ${esc(t.inst)}</div>
        <div style="margin-top:8px">${isInd?labelChip(l.key)+(l.thr>=2?" "+threatBar(l.thr):""):phBadge(t)} &nbsp;${provBadge(t)}</div></div>
      </div>
      <div style="padding:18px 22px">
        ${isInd?`<div class="why" style="background:#eef4fd;border:1px solid var(--line);border-radius:8px;padding:10px 13px;margin-bottom:14px"><b style="color:var(--muted);font-size:11px">WHY THIS IS IN YOUR PORTAL — </b>${l.why}</div>`:""}

        <div id="mediaPane" style="margin-top:6px"></div>
        <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
          <button onclick="toggleBm('${t.id}');this.textContent=bookmarks.has('${t.id}')?'★ Bookmarked':'★ Bookmark'" class="mbtn">${bookmarks.has(t.id)?'★ Bookmarked':'★ Bookmark'}</button>
          ${t.media&&t.media.vid?`<button onclick="playMedia('${t.id}','video')" class="mbtn primary">▶ Watch lecture</button>`:`<button class="mbtn" disabled style="opacity:.45">▶ Video n/a</button>`}
          ${t.media&&t.media.pdf?`<button onclick="playMedia('${t.id}','slides')" class="mbtn">❐ Slides${t.media.pages?` (${t.media.pages}p)`:``}</button>`:`<button class="mbtn" disabled style="opacity:.45">❐ Slides n/a</button>`}

function closeModal(){const m=document.querySelector(".modal-bg");if(m)m.remove();}
function playMedia(id,type){
  const t=byId(id); const pane=document.getElementById('mediaPane'); if(!pane||!t.media) return;
  if(type==='video'&&t.media.vid){
    pane.innerHTML=`<iframe src="https://play.vidyard.com/${t.media.vid}.html?disable_popouts=1&v=4" allow="autoplay;fullscreen" allowfullscreen scrolling="no" style="width:100%;aspect-ratio:16/9;border:0;border-radius:10px;background:#000"></iframe><div style="margin:6px 0 2px;font-size:11px;color:var(--dim)">Streaming via Vidyard · <a class="srclink" href="${t.media.share}" target="_blank" rel="noopener">open in new tab ↗</a></div>`;
  } else if(type==='slides'&&t.media.pdf){
    pane.innerHTML=`<iframe src="${t.media.pdf}" style="width:100%;height:70vh;border:1px solid var(--line);border-radius:10px;background:#fff"></iframe><div style="margin:6px 0 2px;font-size:11px;color:var(--dim)">Slide deck${t.media.pages?` · ${t.media.pages} pages`:``} (PDF) · <a class="srclink" href="${t.media.pdf}" target="_blank" rel="noopener">open in new tab ↗</a></div>`;
  }
  pane.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function filterBar(){const opt=(arr,cur)=>arr.map(v=>`<option ${v===cur?'selected':''}>${esc(v)}</option>`).join("");
  return `<div class="filters">
    <input id="fq" placeholder="Filter…" oninput="FILTERS.q=this.value;refreshLib()" value="${esc(FILTERS.q)}">
    <select onchange="FILTERS.target=this.value;refreshLib()"><option value="">All targets</option>${opt(Object.keys(allTargets()).sort(),FILTERS.target)}</select>
    <select onchange="FILTERS.company=this.value;refreshLib()"><option value="">All companies</option>${opt(Object.keys(allCompanies()).filter(c=>COMPANIES[c]).sort(),FILTERS.company)}</select>
    <select onchange="FILTERS.disease=this.value;refreshLib()"><option value="">All diseases</option>${opt(Object.keys(allDiseases()),FILTERS.disease)}</select>
    <select onchange="FILTERS.modality=this.value;refreshLib()"><option value="">All modalities</option>${opt(Object.keys(allModalities()).sort(),FILTERS.modality)}</select>
    <select onchange="FILTERS.phase=this.value;refreshLib()"><option value="">All evidence</option>${opt(["Ph3","Ph1/2","FIH","Translational","RWE","Review"],FILTERS.phase)}</select>
    <button class="clear" onclick="clearFilters()">Clear</button></div>`;}
function applyFilters(list){return list.filter(t=>{
  if(FILTERS.target&&!t.tg.includes(FILTERS.target))return false;
  if(FILTERS.company&&!uniq(t.co).includes(FILTERS.company))return false;
  if(FILTERS.disease&&t.disease!==FILTERS.disease)return false;
  if(FILTERS.modality&&t.mod!==FILTERS.modality)return false;
  if(FILTERS.phase&&t.phase!==FILTERS.phase)return false;
  if(FILTERS.q){const s=(t.title+t.spk+t.inst+t.drugs.join()+t.tg.join()+t.bm.join()+t.trial+t.s+t.disease).toLowerCase();if(!s.includes(FILTERS.q.toLowerCase()))return false;}
  return true;});}
function refreshLib(){const el=$("#libResults");if(el)el.innerHTML=sessionTable(applyFilters(TALKS));}
function clearFilters(){FILTERS={q:"",target:"",company:"",modality:"",disease:"",phase:""};render();}

FAC.overview=()=>{
  const ph3=TALKS.filter(t=>t.phase==="Ph3").slice(0,5);
  const fih=TALKS.filter(t=>t.fih||t.phase==="FIH").slice(0,5);

  return `<div class="crumb"><b>Overview</b></div>

  <div class="explain">The faculty view is deliberately company-neutral. There is no Impact Score and no competitive framing — just the meeting's science, with source-linked, editor-reviewed records.</div>

  <div class="section-title">Major scientific themes</div>
  <div class="hero-grid">${themes.map(c=>`<div class="theme-card" onclick="go('collection','${c.id}')"><div class="ic">${c.ic}</div><h4>${esc(c.title)}</h4><p>${esc(c.desc)}</p><div class="n">${TALKS.filter(c.f).length} sessions →</div></div>`).join("")}</div>

  <div class="section-title">🟢 New Phase III data <span class="more" onclick="go('phases')">All phases →</span></div>
  ${scienceTable(ph3)}
  <div class="section-title">🟠 First-in-human & early signals</div>
  ${scienceTable(fih)}
  <div class="section-title">🔬 Translational & biomarker science</div>
  ${scienceTable(trans)}

  <div class="section-title">Most-discussed targets</div>
  <div class="card">${topTg.map(([g,l])=>`<span class="tag" style="font-size:12px;padding:4px 11px" onclick="go('target','${esc(g)}')">◎ ${esc(g)} · ${l.length}</span>`).join(" ")}</div>

  <div class="section-title">Browse by disease</div>
  <div class="card">${Object.entries(dis).map(([d,l])=>`<span class="disease-chip" onclick="go('disease','${esc(d)}')">${esc(d)} · ${l.length}</span>`).join("")}</div>

};

/* =====================================================================
   UNIVERSAL SEARCH + BOOT
   ===================================================================== */
let SEARCH_IDX=[];
function buildSearchIndex(){const idx=[];
  Object.keys(allDrugs()).forEach(d=>idx.push({cat:"Drug",label:d,go:()=>go('drug',d)}));
  Object.keys(allTargets()).forEach(t=>idx.push({cat:"Target",label:t,go:()=>go('target',t)}));
  Object.keys(allCompanies()).filter(c=>COMPANIES[c]).forEach(c=>idx.push({cat:"Company",label:c,go:()=>go('company',c)}));
  Object.keys(allTrials()).forEach(t=>idx.push({cat:"Trial",label:t,go:()=>go('trial',t)}));
  Object.keys(allSpeakers()).forEach(s=>idx.push({cat:"Speaker",label:s,sub:allSpeakers()[s].inst,go:()=>go('speaker',s)}));
  Object.keys(allBiomarkers()).forEach(b=>idx.push({cat:"Biomarker",label:b,go:()=>go('biomarker',b)}));
  Object.keys(allDiseases()).forEach(d=>idx.push({cat:"Disease",label:d,go:()=>go('disease',d)}));
  Object.keys(allCQ()).forEach(q=>idx.push({cat:"Clinical question",label:q,go:()=>go('question',q)}));
  TALKS.forEach(t=>idx.push({cat:"Session",label:t.title,sub:t.spk,go:()=>openSession(t.id)}));
  return idx;}
function doSearch(q){const box=$("#searchResults");if(!q||q.length<2){box.classList.add("hidden");return;}
  const ql=q.toLowerCase();
  const hits=SEARCH_IDX.filter(x=>x.label.toLowerCase().includes(ql)||(x.sub&&x.sub.toLowerCase().includes(ql))).slice(0,40);
  if(!hits.length){box.innerHTML=`<div class="sr-item"><div class="m">No matches for "${esc(q)}"</div></div>`;box.classList.remove("hidden");return;}
  const byCat={};hits.forEach(h=>{(byCat[h.cat]=byCat[h.cat]||[]).push(h)});
  box.innerHTML=Object.entries(byCat).map(([cat,list])=>`<div class="sr-cat">${cat}</div>`+list.map(h=>{const gi=SEARCH_IDX.indexOf(h);return `<div class="sr-item" data-i="${gi}"><div class="t">${esc(h.label)}</div>${h.sub?`<div class="m">${esc(h.sub)}</div>`:""}</div>`;}).join("")).join("");
  box.classList.remove("hidden");
  box.querySelectorAll(".sr-item[data-i]").forEach(el=>el.onclick=()=>{SEARCH_IDX[+el.dataset.i].go();box.classList.add("hidden");$("#globalSearch").value="";});}

renderLanding();
document.addEventListener("DOMContentLoaded",renderLanding);
window.addEventListener("load",()=>{const gs=$("#globalSearch");if(gs&&!gs._wired){gs._wired=true;
  gs.addEventListener("input",e=>doSearch(e.target.value));
  gs.addEventListener("keydown",e=>{if(e.key==="Escape"){$("#searchResults").classList.add("hidden");gs.blur();}});}
  document.addEventListener("keydown",e=>{const gs=$("#globalSearch");if(e.key==="/"&&document.activeElement!==gs&&!$("#app").classList.contains("hidden")){e.preventDefault();gs.focus();}});
  document.addEventListener("click",e=>{if(!e.target.closest(".searchwrap")){const b=$("#searchResults");if(b)b.classList.add("hidden");}});
});
