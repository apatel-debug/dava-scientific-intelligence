<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAVA Oncology — 13th Summit on Hematologic Malignancies (Whistler 2026)</title>
<style>

:root{
  --bg:#f0f3f9; --panel:#ffffff; --panel2:#eef2fa; --line:#d9e0ed;
  --ink:#17233b; --muted:#55647d; --dim:#7c8ba4;
  --brand:#c8102e;           /* J&J red */
  --accent:#2f6fed;          /* action blue */
  --gold:#a9760a;
  --good:#2fb673; --warn:#e6a417; --bad:#e5484d;
  --chip:#eef2fa;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd6e6;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 70% -10%,#e9f0fb 0%,#f0f3f9 60%);z-index:100}
.login-card{width:390px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 32px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.login-card .lock{font-size:12px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;margin-bottom:18px}
.brandmark{display:flex;align-items:center;gap:12px;margin-bottom:6px;color:inherit;text-decoration:none}
.brandmark .dot{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),#7a0a1c);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px}
.brandmark .brand-logo{width:38px;height:34px;object-fit:contain;display:block}
.brandmark b{font-size:16px;letter-spacing:.02em}
.login-card h1{font-size:19px;margin:20px 0 4px}
.login-card p.sub{color:var(--muted);margin:0 0 22px;font-size:13px}
.login-card label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px}
.login-card input{width:100%;padding:11px 12px;background:#f6f8fd;border:1px solid var(--line);border-radius:8px;color:var(--ink);font-size:14px}
.login-card input:focus{outline:none;border-color:var(--accent)}
.login-card button{width:100%;margin-top:22px;padding:12px;background:var(--accent);border:0;border-radius:8px;color:#fff;font-weight:600;font-size:14px;cursor:pointer}
.login-card button:hover{background:#255fd6}
.login-note{margin-top:16px;font-size:11.5px;color:var(--dim);text-align:center}
.login-hint{margin-top:10px;font-size:11.5px;color:var(--gold);text-align:center;background:#fbf3dd;border:1px solid #efe1b4;border-radius:7px;padding:8px}

/* ---------- APP SHELL ---------- */
#app{display:grid;grid-template-columns:236px 1fr;grid-template-rows:56px 1fr;height:100vh}
header.topbar{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:0 18px;background:linear-gradient(180deg,#f4f7fc,#ffffff);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.topbar .brandmark b{font-size:14px}
.topbar .tenant{font-size:11px;color:var(--dim);border-left:1px solid var(--line);padding-left:14px;margin-left:2px}
.topbar .tenant b{color:var(--ink);font-weight:600}
.searchwrap{flex:1;max-width:640px;position:relative}
.searchwrap input{width:100%;padding:9px 12px 9px 34px;background:#f6f8fd;border:1px solid var(--line);border-radius:9px;color:var(--ink);font-size:13px}
.searchwrap input:focus{outline:none;border-color:var(--accent)}
.searchwrap .mag{position:absolute;left:11px;top:9px;color:var(--dim)}
.searchwrap .kbd{position:absolute;right:10px;top:8px;font-size:10px;color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:1px 6px}
.topbar .who{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted)}
.topbar .who .av{width:30px;height:30px;border-radius:50%;background:#46577a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#2a4a86}
.topbar .logout{font-size:11px;color:var(--dim);cursor:pointer;border:1px solid var(--line);padding:5px 9px;border-radius:6px}
.topbar .logout:hover{color:var(--ink)}

/* Search results dropdown */
#searchResults{position:absolute;top:42px;left:0;right:0;background:#ffffff;border:1px solid var(--line);border-radius:10px;max-height:60vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.6);z-index:40}
#searchResults .sr-cat{padding:8px 14px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);background:#f6f8fd;position:sticky;top:0}
#searchResults .sr-item{padding:9px 14px;border-top:1px solid #e6ebf4;cursor:pointer}
#searchResults .sr-item:hover{background:#eef4fd}
#searchResults .sr-item .t{font-size:13px}
#searchResults .sr-item .m{font-size:11.5px;color:var(--muted)}

/* ---------- SIDEBAR ---------- */
nav.side{background:#f7f9fc;border-right:1px solid var(--line);overflow:auto;padding:12px 0}
nav.side .grp{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding:14px 20px 6px}
nav.side a.nav{display:flex;align-items:center;gap:11px;padding:9px 20px;color:var(--muted);font-size:13.5px;cursor:pointer;border-left:3px solid transparent}
nav.side a.nav:hover{background:#eef3fb;color:var(--ink)}
nav.side a.nav.active{background:#e6edf8;color:#fff;border-left-color:var(--brand)}
nav.side a.nav .ic{width:17px;text-align:center;opacity:.9}
nav.side a.nav .ct{margin-left:auto;font-size:11px;color:var(--dim);background:#eef2fa;border-radius:20px;padding:1px 8px}
nav.side a.nav.active .ct{color:#2a4a86}

/* ---------- MAIN ---------- */
main{overflow:auto;padding:22px 28px 60px}
.crumb{font-size:12px;color:var(--dim);margin-bottom:14px}
.crumb b{color:var(--muted)}
h2.page{font-size:22px;margin:0 0 3px;letter-spacing:.01em}
.page-sub{color:var(--muted);font-size:13px;margin:0 0 20px;max-width:900px}
.explain{background:#eef4fd;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:10px 14px;color:var(--muted);font-size:12.5px;margin:0 0 20px;max-width:1000px}
.explain b{color:var(--ink)}

.grid{display:grid;gap:16px}
.cards4{grid-template-columns:repeat(4,1fr)}
.cards3{grid-template-columns:repeat(3,1fr)}
.cards2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.cards4{grid-template-columns:repeat(2,1fr)}.cards3{grid-template-columns:1fr 1fr}}

.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h3{margin:0 0 12px;font-size:13px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;font-weight:600}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
.kpi .n{font-size:28px;font-weight:700;letter-spacing:-.01em}
.kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
.kpi .d{font-size:11px;margin-top:7px}
.up{color:var(--good)} .down{color:var(--bad)}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:2px 9px;border-radius:20px;background:var(--chip);color:var(--muted);border:1px solid #dbe3f0;white-space:nowrap}
.pill.direct{background:#e3f7ec;color:#137a4e;border-color:#bfe8d2}
.pill.competitor{background:#fdeaea;color:#c0343a;border-color:#f3c9cb}
.pill.adjacent{background:#fdf6e3;color:#8a6d12;border-color:#efe1b4}
.pill.context{background:#eef2fa;color:#55647d}
.pill.threat{background:#fdeaea;color:#c0343a;border-color:#f3c9cb}
.pill.opp{background:#e8f1fe;color:#2456b8;border-color:#cfe0fb}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:#eef2fa;color:#2a4a86;margin:0 4px 4px 0;border:1px solid #dbe3f0;cursor:pointer}
.tag:hover{background:#d3dcea}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:9px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
td{padding:10px;border-bottom:1px solid #e6ebf4;vertical-align:top}
tr.click{cursor:pointer}
tr.click:hover td{background:#e9eff8}
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tbl-wrap .tbl-scroll{max-height:none;overflow:auto}

.gauge-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.gauge{position:relative;width:190px;height:190px;flex:none}
.gauge svg{transform:rotate(-90deg)}
.gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .center .big{font-size:44px;font-weight:800;line-height:1}
.gauge .center .of{font-size:13px;color:var(--dim)}
.gauge .center .lab{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.08em;text-transform:uppercase}
.score-break{flex:1;min-width:320px}
.sb-row{display:grid;grid-template-columns:190px 1fr 46px;gap:10px;align-items:center;margin-bottom:9px}
.sb-row .lab{font-size:12.5px;color:var(--muted)}
.sb-row .bar{height:8px;background:#e6edf8;border-radius:6px;overflow:hidden}
.sb-row .bar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#5b8bf0)}
.sb-row .val{font-size:12px;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}

.section-title{font-size:15px;margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.section-title .more{margin-left:auto;font-size:12px;color:var(--accent);cursor:pointer}

.pl-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px;cursor:pointer;transition:.15s}
.pl-card:hover{border-color:#c0cde0;transform:translateY(-2px)}
.pl-card .aud{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.pl-card h4{margin:0 0 6px;font-size:14.5px}
.pl-card p{margin:0;color:var(--muted);font-size:12px}
.pl-card .foot{margin-top:11px;font-size:11.5px;color:var(--dim);display:flex;gap:12px}

.matrix{overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px}
.matrix table{font-size:12px}
.matrix th{background:var(--panel);white-space:nowrap}
.matrix td.cell{text-align:center;cursor:pointer}
.mx{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:24px;border-radius:6px;font-weight:600;font-size:11.5px}
.mx.jnj{background:#e3f7ec;color:#137a4e}
.mx.comp{background:#fdeaea;color:#c0343a}
.mx.some{background:#eef2fa;color:#33507d}
.mx.zero{color:#c2cbdb}
.rowlab{font-weight:600;white-space:nowrap;color:#27395c}

.detail-head{display:flex;gap:18px;align-items:flex-start;margin-bottom:6px}
.logo-badge{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;flex:none}
.back{font-size:12.5px;color:var(--accent);cursor:pointer;margin-bottom:14px;display:inline-block}
.back:hover{text-decoration:underline}
.metabar{display:flex;gap:26px;flex-wrap:wrap;margin:14px 0 8px;padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.metabar .m .n{font-size:20px;font-weight:700}
.metabar .m .l{font-size:11px;color:var(--muted)}

.talk-row .tt{font-size:13.5px;color:var(--ink)}
.talk-row .meta{font-size:11.5px;color:var(--dim);margin-top:3px}
.bm{cursor:pointer;color:var(--dim);font-size:15px}
.bm.on{color:var(--gold)}
.dl{cursor:pointer;color:var(--dim);font-size:14px}
.dl:hover,.bm:hover{color:var(--ink)}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters select,.filters input{background:#f6f8fd;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-size:12.5px}
.filters .clear{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12.5px}

.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:8px 0 14px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.sw{width:12px;height:12px;border-radius:3px;display:inline-block}

.chip-toggle{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:14px}
.chip-toggle button{background:transparent;border:0;color:var(--muted);padding:7px 14px;font-size:12.5px;cursor:pointer}
.chip-toggle button.on{background:var(--accent);color:#fff}

.empty{color:var(--dim);font-size:13px;padding:30px;text-align:center}
.bars-h .b{display:grid;grid-template-columns:150px 1fr 40px;gap:10px;align-items:center;margin-bottom:7px;font-size:12.5px}
.bars-h .b .track{height:16px;background:#e6edf8;border-radius:5px;overflow:hidden}
.bars-h .b .track span{display:block;height:100%}
.footer-note{margin-top:40px;padding-top:16px;border-top:1px solid var(--line);color:var(--dim);font-size:11px;max-width:900px}
.threatbar{display:inline-block;width:44px;height:7px;border-radius:4px;background:#e6edf8;overflow:hidden;vertical-align:middle}
.threatbar span{display:block;height:100%;background:var(--bad)}

/* modal + buttons (unified platform) — light theme */
.modal-bg{position:fixed;inset:0;background:rgba(12,22,38,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:24px}
.media-modal{max-width:1120px;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;max-height:92vh;overflow:auto;box-shadow:0 28px 90px rgba(12,22,38,.28)}
.media-modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:flex-start}
.media-modal-head img{width:170px;height:96px;object-fit:cover;border-radius:9px;flex:none;border:1px solid var(--line);background:#f6f8fd}
.media-modal-body{padding:18px 22px}
.media-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 22px;font-size:13px}
.media-modal .close-x{margin-left:auto;background:#eef2fa;border:1px solid #d3dcea;color:#1b2b45;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;line-height:1}
.media-modal .close-x:hover{background:#e2e9f6}
.mbtn{background:#eef2fa;border:1px solid #d3dcea;color:#1b2b45;border-radius:8px;padding:10px 15px;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;min-height:40px}
.mbtn:hover{background:#e2e9f6}
.mbtn.primary{background:var(--accent);border:1px solid var(--accent);color:#fff}
.mbtn.primary:hover{background:#255fd6}
.mbtn:disabled{cursor:default}

/* ===================== UNIFIED PLATFORM ADDITIONS ===================== */
/* Experience theming — one shell, accent swaps by role */
#app.exp-industry{--brand:#c8102e;--accent:#2f6fed;--exp:#2f6fed}
#app.exp-faculty{--brand:#1f9e8b;--accent:#17a2b8;--exp:#2ac2a8}
#app.exp-admin{--brand:#b06be0;--accent:#8a5cf0;--exp:#a98bff}
.topbar .expchip{font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--exp);color:#04121f;font-weight:800}

/* ---- ROLE LANDING ---- */
#login{position:fixed;inset:0;overflow:auto;background:radial-gradient(1400px 700px at 72% -12%,#e9f0fb 0%,#f0f3f9 62%);z-index:100;padding:40px 20px}
.land{max-width:1040px;margin:0 auto}
.land-head{display:flex;align-items:center;gap:13px;margin-bottom:6px}
.land-head .dot{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#2f6fed,#1b3f8f);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
.land-head .brand-logo{width:48px;height:42px;object-fit:contain;display:block}
.land h1{font-size:24px;margin:14px 0 4px;color:#17233b}
.land .lede{color:#55647d;font-size:14px;max-width:760px;margin:0 0 6px}
.land .authnote{color:#76859e;font-size:12px;background:#eef4fd;border:1px solid #d9e0ed;border-left:3px solid #2f6fed;border-radius:8px;padding:10px 13px;margin:16px 0 26px;max-width:820px}
.land .authnote b{color:#2a4a86}
.exp-group{margin:22px 0}
.exp-group h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#687892;margin:0 0 12px;display:flex;align-items:center;gap:9px}
.exp-group h2 .bar{height:1px;flex:1;background:#d9e0ed}
.id-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:820px){.id-grid{grid-template-columns:1fr}}
.id-card{background:#ffffff;border:1px solid #d9e0ed;border-radius:12px;padding:15px 16px;cursor:pointer;transition:.15s;position:relative}
.id-card:hover{transform:translateY(-2px);border-color:#c0cde0;box-shadow:0 16px 40px rgba(0,0,0,.4)}
.exp-group.industry .id-card{border-left:4px solid #6d4aa7}
.exp-group.faculty .id-card{border-left:4px solid #1f9e8b}
.exp-group.admin .id-card{border-left:4px solid #8a5cf0}
.id-card .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;margin-bottom:10px}
.id-card h3{margin:0 0 2px;font-size:15px;color:#17233b}
.id-card .role{font-size:12px;color:#55647d}
.id-card .org{font-size:11.5px;color:#7c8ba4;margin-top:8px;border-top:1px solid #e9eff8;padding-top:8px}
.id-card .ent{position:absolute;top:14px;right:14px;font-size:11px;color:#8090a8}
.id-card .scope{margin-top:9px;font-size:10.5px;color:#76859e}
.land-foot{color:#8090a8;font-size:11px;text-align:center;margin-top:34px;border-top:1px solid #e9eff8;padding-top:16px}

/* ---- RELEVANCE LABELS (industry, 8) ---- */
.lbl{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:6px;white-space:nowrap;border:1px solid}
.lbl.portfolio{background:#e3f7ec;color:#137a4e;border-color:#bfe8d2}
.lbl.competitor{background:#fdeaea;color:#c0343a;border-color:#f3c9cb}
.lbl.emerging{background:#f6ecfd;color:#8b3fb0;border-color:#e6d0f4}
.lbl.adjacent{background:#fdf6e3;color:#8a6d12;border-color:#efe1b4}
.lbl.biomarker{background:#e8f1fe;color:#2456b8;border-color:#cfe0fb}
.lbl.resistance{background:#f2ecfd;color:#7a3fc0;border-color:#ddd0f4}
.lbl.lifecycle{background:#e3f6f4;color:#12796e;border-color:#bfe8e2}
.lbl.context{background:#eef2fa;color:#55647d;border-color:#d3dcea}
.why{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.45}
.why b{color:#2a3a56}

/* ---- PROVENANCE / editorial ---- */
.prov{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:#1f7a4e;background:#e9f7ef;border:1px solid #c3e6d1;border-radius:5px;padding:1px 7px}
.prov.pending{color:#8a6d12;background:#fbf3dd;border-color:#efe1b4}
.srclink{font-size:11px;color:var(--accent);cursor:pointer}
.srclink:hover{text-decoration:underline}

/* ---- SCIENCE BADGES (faculty) ---- */
.ph{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;letter-spacing:.03em}
.ph.ph3{background:#e3f7ec;color:#137a4e}
.ph.ph2{background:#e8f1fe;color:#2456b8}
.ph.ph12,.ph.ph1{background:#f2ecfd;color:#7a3fc0}
.ph.fih{background:#fdf0dd;color:#a9600a}
.ph.trans{background:#e3f6f4;color:#12796e}
.ph.rwe{background:#eef2fa;color:#55647d}
.ph.review{background:#f5edfa;color:#8b5aa8}
.ev{font-size:10.5px;color:#55647d}
.disease-chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;background:#e6f6f0;color:#12796e;border:1px solid #bfe8dc;margin:0 5px 5px 0;cursor:pointer}
.disease-chip:hover{background:#d5efe5}
.setting-chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:6px;background:#eef2fa;color:#2a4a86;border:1px solid #dbe3f0;margin:0 4px 4px 0}

/* ---- SCORE DISCLAIMER ---- */
.disc{font-size:11px;color:var(--dim);background:#eef4fd;border:1px dashed #d3dcea;border-radius:8px;padding:10px 13px;margin-top:12px;line-height:1.5}
.disc b{color:var(--muted)}

.q-status{font-size:11px;padding:2px 8px;border-radius:20px}
.q-status.rev{background:#e9f7ef;color:#1f7a4e;border:1px solid #c3e6d1}
.q-status.pend{background:#fbf3dd;color:#8a6d12;border:1px solid #efe1b4}

.theme-card .ic{font-size:20px}
.theme-card h4{margin:8px 0 4px;font-size:14px}
.theme-card p{margin:0;font-size:11.5px;color:var(--muted)}

.conf-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;background:#eef2fa;border:1px solid #dbe3f0;border-radius:20px;padding:3px 11px;color:var(--muted);cursor:pointer}

:root{--accent:#6d4aa7;--brand:#5b3f8c;--gold:#7a5a12;--exp:#6d4aa7}
.wapp{display:grid;grid-template-columns:236px 1fr;grid-template-rows:56px 1fr;height:100vh}
.wapp>header.topbar{grid-column:1/3;grid-row:1}
.wapp>nav.side{grid-column:1;grid-row:2}
.wapp>main{grid-column:2;grid-row:2;min-width:0}

.mtgwrap{display:flex;align-items:center;gap:9px;border-left:1px solid var(--line);padding-left:13px;margin-left:2px}
.mtgchip{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:#efe9f7;color:#5b3f8c;font-weight:800;border:1px solid #ddd0ee}
.mtgsel{background:#f6f8fd;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 9px;font-size:12.5px;font-weight:600;cursor:pointer}

function transcriptMeta(p){return TRANSCRIPT_MANIFEST.items[videoUuid(p)]||null;}
function transcriptButton(p){const t=transcriptMeta(p);return t?`<button class="vbtn" onclick="openPresModal('${p.id}','transcript')">≡ Transcript</button>`:`<span class="vbtn off">≡ Transcript pending</span>`;}
function parseVttTime(v){const parts=v.trim().split(":").map(Number);if(parts.length===3)return parts[0]*3600+parts[1]*60+parts[2];if(parts.length===2)return parts[0]*60+parts[1];return Number(v)||0;}
function fmtTime(sec){sec=Math.max(0,Math.floor(sec||0));const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return h?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`;}
function parseVtt(text){return text.replace(/\r/g,"").split(/\n\n+/).map(block=>{const lines=block.split("\n").map(x=>x.trim()).filter(Boolean);const i=lines.findIndex(x=>x.includes("-->"));if(i<0)return null;const times=lines[i].split("-->").map(x=>x.trim().split(/\s+/)[0]);const cueText=lines.slice(i+1).join(" ").replace(/<[^>]+>/g,"").replace(/\s+/g," ").trim();return cueText?{start:parseVttTime(times[0]),end:parseVttTime(times[1]),text:cueText}:null;}).filter(Boolean);}
async function loadTranscript(p){const meta=transcriptMeta(p);if(!meta)return [];if(TRANSCRIPT_CACHE[meta.uuid])return TRANSCRIPT_CACHE[meta.uuid];const res=await fetch(meta.vtt);if(!res.ok)throw new Error("Transcript not available");const cues=parseVtt(await res.text());TRANSCRIPT_CACHE[meta.uuid]=cues;return cues;}
function renderTranscriptPanel(p,cues){const meta=transcriptMeta(p);const rows=cues.map((c,i)=>`<div class="transcript-cue" data-i="${i}" data-start="${c.start}" onclick="seekTranscript('${p.id}',${c.start})"><div class="transcript-time">${fmtTime(c.start)}</div><div class="transcript-text">${esc(c.text)}</div></div>`).join("");return `<div class="transcript-panel"><div class="transcript-head"><b>Transcript</b><span class="transcript-count">${cues.length||meta?.cueCount||0} timed entries</span></div><input class="transcript-search" placeholder="Search transcript" oninput="filterTranscript(this.value)"><div class="transcript-list" id="transcriptList">${rows||'<div class="transcript-note">Transcript is not available for this lecture yet.</div>'}</div></div>`;}
function filterTranscript(q){q=(q||"").toLowerCase();document.querySelectorAll(".transcript-cue").forEach(row=>{row.style.display=row.innerText.toLowerCase().includes(q)?"grid":"none";});}
function currentVidyardPlayer(uuid){try{return window.VidyardV4?.api?.getPlayersByUUID?.(uuid)?.[0]||null}catch{return null}}
function playerSeconds(player){for(const key of ["getCurrentTime","currentTime","getCurrentPosition","getPosition"]){try{if(typeof player?.[key]==="function"){const v=player[key]();if(Number.isFinite(Number(v)))return Number(v);}}catch{}}return null;}
function highlightTranscriptLine(sec){const cues=ACTIVE_TRANSCRIPT.cues||[];let idx=cues.findIndex(c=>sec>=c.start&&sec<c.end);if(idx<0)idx=cues.findLastIndex?cues.findLastIndex(c=>sec>=c.start):cues.map(c=>c.start).lastIndexOf(Math.max(...cues.filter(c=>sec>=c.start).map(c=>c.start)));if(idx===ACTIVE_TRANSCRIPT.lastIndex)return;ACTIVE_TRANSCRIPT.lastIndex=idx;document.querySelectorAll(".transcript-cue.active").forEach(x=>x.classList.remove("active"));const el=document.querySelector(`.transcript-cue[data-i="${idx}"]`);if(el){el.classList.add("active");el.scrollIntoView({block:"nearest"});}}
function seekTranscript(id,seconds){const p=bmById(id);const uuid=p?videoUuid(p):ACTIVE_TRANSCRIPT.uuid;const player=currentVidyardPlayer(uuid);if(player?.seek){player.seek(seconds);if(player.play)player.play();}highlightTranscriptLine(seconds);}
function startTranscriptSync(p,cues){if(ACTIVE_TRANSCRIPT.timer)clearInterval(ACTIVE_TRANSCRIPT.timer);ACTIVE_TRANSCRIPT={id:p.id,uuid:videoUuid(p),cues,lastIndex:-1,timer:null};ACTIVE_TRANSCRIPT.timer=setInterval(()=>{const player=currentVidyardPlayer(ACTIVE_TRANSCRIPT.uuid);const sec=playerSeconds(player);if(sec!=null)highlightTranscriptLine(sec);},700);}
function mountVidyard(p){const uuid=videoUuid(p);const mount=$("#vidyardMount");const render=api=>{try{api.api.renderDOMPlayers(mount);api.api.addReadyListener((_,player)=>{if(player?.uuid===uuid)ACTIVE_TRANSCRIPT.player=player;},uuid);}catch{}};if(window.VidyardV4)render(window.VidyardV4);else window.onVidyardAPI=render;setTimeout(()=>{if(mount&&!mount.querySelector("iframe"))mount.innerHTML=`<iframe src="${esc(p.videoUrl)}" allow="autoplay;fullscreen" allowfullscreen scrolling="no" style="width:100%;height:100%;border:0;background:#000"></iframe>`;},3500);}
async function hydrateTranscript(p,focusTranscript=false){const slot=$("#transcriptSlot");if(!slot)return;try{const cues=await loadTranscript(p);slot.innerHTML=renderTranscriptPanel(p,cues);startTranscriptSync(p,cues);if(focusTranscript)setTimeout(()=>{const s=document.querySelector(".transcript-search");if(s)s.focus({preventScroll:true});const panel=document.querySelector(".transcript-panel");if(panel)panel.scrollIntoView({behavior:"smooth",block:"nearest"});},60);}catch(e){slot.innerHTML='<div class="transcript-panel"><div class="transcript-note">Transcript could not be loaded in this preview. Use the local preview server or GitHub Pages path.</div></div>';}}

function applyF(){return PRES.filter(p=>{
 if(F.disease&&!p.diseaseAreas.includes(F.disease))return false;
 if(F.target&&!p.targets.concat(p.biomarkers).includes(F.target))return false;
 if(F.modality&&!p.modalities.includes(F.modality))return false;
 if(F.setting&&!p.treatmentSettings.includes(F.setting))return false;
 if(F.phase&&p.trialPhase!==F.phase)return false;
 if(F.evidence&&p.evidenceType!==F.evidence)return false;
 if(F.video&&!p.videoAvailable)return false;
 if(F.slides&&!p.slidesAvailable)return false;
 if(F.q){const s=(p.title+p.speaker+p.session+p.drugs.join()+p.targets.join()+p.trialName+p.diseaseAreas.join()+p.institution).toLowerCase();if(!s.includes(F.q.toLowerCase()))return false;}
 return true;
});}

let SEARCH_IDX=[];
function buildSearchIndex(){const idx=[];
 Object.keys(byDisease()).forEach(d=>idx.push({cat:"Disease",label:d,go:()=>go('disease',d)}));
 Object.keys(group(p=>p.targets.concat(p.biomarkers))).forEach(t=>idx.push({cat:"Target / biomarker",label:t,go:()=>go('target',t)}));
 Object.keys(byModality()).forEach(m=>idx.push({cat:"Modality",label:m,go:()=>go('modality',m)}));
 Object.keys(bySpeaker()).forEach(s=>idx.push({cat:"Speaker",label:s,go:()=>go('speaker',s)}));
 uniq(PRES.flatMap(p=>p.drugs)).forEach(d=>idx.push({cat:"Drug",label:d,sub:"",go:()=>{F=Object.assign(F,{q:d});go('all');setTimeout(()=>{const el=$("#fq");if(el){el.value=d;refreshAll();}},20);}}));
 uniq(PRES.filter(p=>p.trialName).flatMap(p=>p.trialName.split(" / "))).forEach(t=>idx.push({cat:"Trial",label:t,go:()=>{F=Object.assign(F,{q:t});go('all');setTimeout(()=>{const el=$("#fq");if(el){el.value=t;refreshAll();}},20);}}));
 COLLECTIONS.forEach(c=>idx.push({cat:"Collection",label:c.t,go:()=>go('collection',c.id)}));
 PRES.forEach(p=>idx.push({cat:"Presentation",label:p.title,sub:p.speaker,go:()=>openPresModal(p.id,'video')}));

function doSearch(q){const box=$("#searchResults");if(!q||q.length<2){box.classList.add("hidden");return;}
 const ql=q.toLowerCase();const hits=SEARCH_IDX.filter(x=>x.label.toLowerCase().includes(ql)||(x.sub&&x.sub.toLowerCase().includes(ql))).slice(0,40);
 if(!hits.length){box.innerHTML=`<div class="sr-item"><div class="m">No matches for "${esc(q)}"</div></div>`;box.classList.remove("hidden");return;}
 const byCat={};hits.forEach(h=>{(byCat[h.cat]=byCat[h.cat]||[]).push(h)});
 box.innerHTML=Object.entries(byCat).map(([cat,list])=>`<div class="sr-cat">${cat}</div>`+list.map(h=>{const gi=SEARCH_IDX.indexOf(h);return `<div class="sr-item" data-i="${gi}"><div class="t">${esc(h.label)}</div>${h.sub?`<div class="m">${esc(h.sub)}</div>`:""}</div>`;}).join("")).join("");
 box.classList.remove("hidden");
 box.querySelectorAll(".sr-item[data-i]").forEach(el=>el.onclick=()=>{SEARCH_IDX[+el.dataset.i].go();box.classList.add("hidden");$("#globalSearch").value="";});
}

 const ownAssets=uniq(PRES.flatMap(p=>p.drugs).filter(d=>assetsLC.includes((d||"").toLowerCase()))).length;

 const trials=uniq(rel.filter(p=>p.trialName).flatMap(p=>p.trialName.split(" / "))).length;

 const kols=uniq(PRES.filter(p=>["portfolio","lifecycle","competitor","emerging"].includes(L[p.id].key)).map(p=>p.speaker)).length;
 const hiPri=PRES.filter(p=>L[p.id].pr>=2).length;
 const comps=[
  {k:"Direct portfolio relevance",w:.24,raw:directRel,ceil:12},
  {k:"Competitive pressure",w:.20,raw:compCount,ceil:24},
  {k:"Novel molecules",w:.14,raw:compAssets+ownAssets,ceil:26},
  {k:"Targets & biomarkers",w:.12,raw:tgBm,ceil:10},
  {k:"Clinical trials",w:.12,raw:trials,ceil:14},

 let total=0;comps.forEach(c=>{c.pct=Math.min(100,Math.round(c.raw/c.ceil*100));total+=c.pct*c.w;});
 total=Math.round(total);
 const band=total>=85?"Very high":total>=65?"High":total>=45?"Moderate":total>=25?"Low":"Minimal";
 return {total,band,comps,directRel,compCount,trials,kols};
}

IV.competitors=()=>{const L=lensFor(COMPANY);return page({title:"Direct Competitors",sub:`Assets competing on ${esc(COMPANY)}'s targets, threat-graded (1–3). Threat 3 = Phase III as stated in agenda.`,body:pgrid(lensList(COMPANY,["competitor"]).sort((a,b)=>L[b.id].thr-L[a.id].thr))});};
IV.emerging=()=>page({title:"Emerging Threats",sub:`Early / next-generation programs on ${esc(COMPANY)}'s targets to watch.`,body:pgrid(lensList(COMPANY,["emerging"]))});
IV.landscape=()=>{const co=COMPANY,L=lensFor(co),P=HPROFILES[co]||{targets:[],adjacent:[]};
 const tgKeys=uniq([...P.targets,...P.adjacent,...Object.keys(byTarget()).slice(0,12)]).slice(0,16);
 const cos=Object.keys(group(p=>coOf(p))).filter(c=>c!=="Academic / Investigator").sort((a,b)=>lensList(b,["portfolio","lifecycle","competitor","emerging"]).length-lensList(a,["portfolio","lifecycle","competitor","emerging"]).length);
 const cell=(c,t)=>{const list=PRES.filter(p=>coOf(p).includes(c)&&p.targets.concat(p.biomarkers).includes(t));if(!list.length)return `<td class="cell"><span class="mx zero">·</span></td>`;
  const mine=c===co, comp=list.some(p=>["competitor","emerging"].includes(L[p.id].key));
  return `<td class="cell" onclick="go('company','${esc(c)}')"><span class="mx ${mine?'jnj':comp?'comp':'some'}">${list.length}</span></td>`;};
 return page({title:"Competitive Landscape",sub:`Company × target crowding from ${esc(co)}'s Whistler lens. Core and adjacent target axes are emphasized first.`,
  body:`<div class="legend"><span><span class="sw" style="background:#e3f7ec;border:1px solid #bfe8d2"></span>${esc(co)}</span><span><span class="sw" style="background:#fdeaea;border:1px solid #f3c9cb"></span>Competitor or emerging threat</span><span><span class="sw" style="background:#eef2fa"></span>Other activity</span></div>
  <div class="matrix"><table><thead><tr><th>Company</th>${tgKeys.map(t=>`<th style="text-align:center">${esc(t)}</th>`).join("")}</tr></thead>
  <tbody>${cos.map(c=>`<tr><td class="rowlab">${coBadge(c)} ${esc(c)}</td>${tgKeys.map(t=>cell(c,t)).join("")}</tr>`).join("")}</tbody></table></div>`});};
IV.targets=()=>{const co=COMPANY,P=HPROFILES[co]||{targets:[],adjacent:[]},map=byTarget();
 const keys=Object.keys(map).sort((a,b)=>(P.targets.includes(b)-P.targets.includes(a))||(P.adjacent.includes(b)-P.adjacent.includes(a))||map[b].length-map[a].length);
 return page({title:"Target Landscape",sub:"Every target tagged in the Whistler agenda; your sponsor's core and adjacent targets are flagged.",
  body:`<div class="explore-grid">${keys.map(k=>{const own=P.targets.includes(k),adj=(P.adjacent||[]).includes(k);
   return `<div class="xcard" onclick="go('target','${esc(k)}')"><div class="caud" style="color:${own?'#137a4e':adj?'#8a6d12':'var(--dim)'}">${own?'Core target':adj?'Adjacent':'Field'}</div><h4>◎ ${esc(k)}</h4><p>${uniq(map[k].flatMap(p=>p.drugs.concat(p.diseaseAreas))).slice(0,5).join(" · ")||"Pathway / translational"}</p><div class="n">${map[k].length} presentations →</div></div>`;}).join("")}</div>`});};
IV.biomarkers=()=>{const map=byBiomarker();const keys=Object.keys(map).sort((a,b)=>map[b].length-map[a].length);
 return page({title:"Biomarker Landscape",sub:"Predictive, prognostic, molecular-monitoring and resistance biomarkers represented in Whistler content.",
  body:`<div class="explore-grid">${keys.map(k=>`<div class="xcard" onclick="go('target','${esc(k)}')"><div class="caud">Biomarker</div><h4>⬡ ${esc(k)}</h4><p>${uniq(map[k].flatMap(p=>p.diseaseAreas.concat(p.targets))).slice(0,5).join(" · ")||"To be verified"}</p><div class="n">${map[k].length} presentations →</div></div>`).join("")}</div>`});};
IV.resistance=()=>{const co=COMPANY;let list=lensList(co,["resistance"]);
 if(!list.length)list=lensList(co,["biomarker"]).filter(p=>/resist|refractory|relapsed|failure|escape|mutation|sequenc/i.test(p.title+" "+p.session+" "+p.evidenceType));
 if(!list.length)list=lensList(co,["biomarker","competitor","emerging"]).filter(p=>p.biomarkers.length||/relapsed|refractory/i.test(p.treatmentSettings.join(" ")));
 return page({title:"Resistance Biology",sub:`Resistance, relapse, sequencing and biomarker-driven escape themes relevant to ${esc(co)}'s hematology targets.`,body:pgrid(list)});};
IV.combinations=()=>{const co=COMPANY;const rel=lensList(co,["portfolio","lifecycle","competitor","emerging","biomarker","resistance","adjacent"]);
 const list=rel.filter(p=>p.drugs.length>1||/combination|combo|quadruplet|triplet|doublet|plus|\\+/i.test(p.title+" "+p.session+" "+p.modalities.join(" ")));
 return page({title:"Combination Strategies",sub:`Doublets, triplets, quadruplets and sequencing combinations relevant to ${esc(co)}'s targets or adjacent interests.`,body:pgrid(list)});};
IV.trials=()=>{const map=byTrial();const entries=Object.entries(map).sort((a,b)=>b[1].length-a[1].length);
 return page({title:"Clinical Trials",sub:"Named studies referenced in the meeting file, mapped to drug, sponsor, target and phase where stated.",
  body:`<div class="tbl-wrap"><div class="tbl-scroll"><table><thead><tr><th>Trial</th><th>Drug(s)</th><th>Sponsor</th><th>Target / biomarker</th><th>Phase</th><th style="text-align:right">Presentations</th></tr></thead>
  <tbody>${entries.map(([tr,l])=>{const p=l[0];return `<tr class="click" onclick="go('trial','${esc(tr)}')"><td><b>${esc(tr)}</b></td><td>${uniq(l.flatMap(x=>x.drugs)).slice(0,4).map(esc).join(", ")||"—"}</td><td>${uniq(l.flatMap(x=>coOf(x))).map(c=>coBadge(c,18)).join(" ")}</td><td>${uniq(l.flatMap(x=>x.targets.concat(x.biomarkers))).slice(0,5).map(t=>`<span class="tgchip">${esc(t)}</span>`).join("")}</td><td>${phBadge(p)}</td><td style="text-align:right">${l.length}</td></tr>`;}).join("")}</tbody></table></div></div>`});};
IV.trial=(tr)=>{const list=byTrial()[tr]||[];return page({title:`⧉ ${esc(tr)}`,sub:`${list.length} presentations referencing this trial name.`,body:back("trials","Clinical trials")+pgrid(list)});};
IV.companies=()=>{const m={};PRES.forEach(p=>coOf(p).forEach(c=>{if(c!=="Academic / Investigator")(m[c]=m[c]||[]).push(p)}));
 const e=Object.entries(m).sort((a,b)=>b[1].length-a[1].length);
 return page({title:"Companies",sub:"Sponsors with assets discussed at the meeting (rule-derived ownership — review pending).",body:`<div class="explore-grid">${e.map(([c,l])=>`<div class="xcard" onclick="go('company','${esc(c)}')"><div style="display:flex;align-items:center;gap:9px;margin-bottom:7px">${coBadge(c,30)}<h4 style="margin:0">${esc(c)}</h4></div><p>${uniq(l.flatMap(p=>p.diseaseAreas)).slice(0,4).join(", ")}</p><div class="n">${l.length} presentations →</div></div>`).join("")}</div>`});};
IV.company=(c)=>{const list=PRES.filter(p=>coOf(p).includes(c));return `<span class="back" onclick="go('companies')">← Companies</span>${page({title:esc(c),sub:`${list.length} presentations mention a ${esc(c)} asset (rule-derived — review pending).`,body:pgrid(list)})}`;};

/* ---- mode-aware overrides (win via last function declaration) ---- */
function renderSide(){
 const nav=(MODE==="industry")?NAV_IND:NAV_FAC;
 $("#side").innerHTML=nav.map(n=>{
  if(n.grp)return `<div class="grp">${n.grp}</div>`;
  let ct="";if(n.n){try{ct=`<span class="ct">${n.n()}</span>`}catch(e){}}
  return `<a class="nav ${VIEW.id===n.id?'active':''}" onclick="go('${n.id}')"><span class="ic">${n.ic}</span>${n.label}${ct}</a>`;
 }).join("");
}
function render(){const reg=(MODE==="industry")?IV:V;const f=reg[VIEW.id]||V[VIEW.id]||reg.overview;$("#main").innerHTML=f(VIEW.arg);renderSide();}

/* ---- role landing ---- */
const IDENTITIES=[
 {id:"jnj-med",name:"Johnson & Johnson",init:"J&J",mode:"industry",company:"Johnson & Johnson",role:"Medical Affairs",org:"Johnson & Johnson",scope:"Sponsor medical affairs portal with J&J hematology content and approved competitive context."},
 {id:"jnj-msl",name:"Johnson & Johnson",init:"J&J",mode:"industry",company:"Johnson & Johnson",role:"MSL",org:"Johnson & Johnson",scope:"Field medical view for J&J-scoped sessions, slides, videos and clinical discussion points."},
 {id:"jnj-admin",name:"Johnson & Johnson",init:"J&J",mode:"industry",company:"Johnson & Johnson",role:"Administrator",org:"Johnson & Johnson",scope:"Manages J&J users and collections; same sponsor-scoped content view."},
 {id:"pfe-med",name:"Pfizer",init:"PF",mode:"industry",company:"Pfizer",role:"Medical Affairs",org:"Pfizer",scope:"Pfizer-scoped medical affairs portal only — demonstrates sponsor isolation."},
 {id:"pfe-msl",name:"Pfizer",init:"PF",mode:"industry",company:"Pfizer",role:"MSL",org:"Pfizer",scope:"Field medical view for Pfizer-scoped sessions, slides, videos and discussion points."},
 {id:"pfe-admin",name:"Pfizer",init:"PF",mode:"industry",company:"Pfizer",role:"Administrator",org:"Pfizer",scope:"Manages Pfizer users and collections; cannot see other sponsors' portals."},
 {id:"gmab-med",name:"Genmab",init:"GM",mode:"industry",company:"Genmab",role:"Medical Affairs",org:"Genmab",scope:"Genmab-scoped medical affairs portal for CD20 bispecific and adjacent content."},
 {id:"gmab-msl",name:"Genmab",init:"GM",mode:"industry",company:"Genmab",role:"MSL",org:"Genmab",scope:"Field medical view for Genmab-scoped sessions, slides, videos and discussion points."},
 {id:"gmab-admin",name:"Genmab",init:"GM",mode:"industry",company:"Genmab",role:"Administrator",org:"Genmab",scope:"Manages Genmab users and collections; sponsor-scoped portal access."},
 {id:"fac1",name:"K. Patel, MD",init:"KP",mode:"faculty",company:null,role:"Faculty / Program",org:"Faculty",scope:"Faculty scientific dashboard — company-neutral science view."},
 {id:"fac2",name:"C. DiNardo, MD",init:"CD",mode:"faculty",company:null,role:"Faculty",org:"Faculty",scope:"Faculty science view — approved sessions, slides & video."}];
function renderLanding(){
 const groups=[
  {kind:"industry",t:"Industry sponsor portals",note:"Choose a sponsor and user type. Each company sees only its own curated competitive portal.",ids:["jnj-med","jnj-msl","jnj-admin","pfe-med","pfe-msl","pfe-admin","gmab-med","gmab-msl","gmab-admin"]},
  {kind:"faculty",t:"Doctors / faculty — science-first view",note:"Same content, organized by disease and clinical science with no sponsor lens.",ids:["fac1","fac2"]}];
 const card=id=>{const u=IDENTITIES.find(x=>x.id===id);const bg=u.company?coColor(u.company):"#6d4aa7";
  return `<div class="id-card" onclick="enter('${u.id}')"><span class="ent">Enter →</span>
   <div class="av" style="background:${bg}">${u.init}</div>
   <h3>${esc(u.name)}</h3><div class="role">${esc(u.role)}</div>
   <div class="org">${esc(u.org)}</div><div class="scope">${esc(u.scope)}</div></div>`;};
 $("#login").innerHTML=`<div class="land">
  <div class="land-head"><img class="brand-logo" src="../assets/DavaLogo.png" alt="DAVA Oncology"><div><div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#6d4aa7">DAVA Oncology</div><b style="color:#17233b;font-size:15px">Scientific Intelligence Platform</b></div></div>
  <h1>${esc(META.name)}</h1>
  <p class="lede">${esc(META.venue)} · ${esc(META.dates)}. One repository, two experiences — choose a demonstration identity to enter the Industry (per-company) or Faculty (science-first) view.</p>
  <div class="authnote"><b>Prototype.</b> In production these are individual SSO accounts scoped by organization and issued by DAVA. Industry identities preview a per-sponsor competitive lens; faculty identities see the company-neutral science view.</div>
  ${groups.map(g=>`<div class="exp-group ${esc(g.kind)}"><h2>${esc(g.t)}<span class="bar"></span></h2><div style="font-size:11.5px;color:#76859e;margin:-6px 0 12px">${esc(g.note)}</div><div class="id-grid">${g.ids.map(card).join("")}</div></div>`).join("")}
  <div class="land-foot">${esc(META.name)} · ${esc(META.dates)} · Prototype — sample content, tags pending editorial review</div>
 </div>`;
}
function enter(id){
 USER=IDENTITIES.find(x=>x.id===id);MODE=USER.mode;COMPANY=USER.company;
 $("#login").classList.add("hidden");$("#app").classList.remove("hidden");
 $("#wAv").textContent=USER.init;$("#wAv").style.background=USER.company?coColor(USER.company):"#6d4aa7";
 $("#wInfo").innerHTML=`${esc(USER.name)}<br><span style="font-size:10px;color:var(--dim)">${esc(USER.role)}</span>`;
 const chip=$("#modeChip");if(chip)chip.textContent=MODE==="industry"?("Industry · "+USER.company):"Faculty View";
 if(!_wired){wireSearch();_wired=true;}
 VIEW={id:"overview",arg:null};render();window.scrollTo(0,0);
}
function logoutW(){$("#app").classList.add("hidden");$("#login").classList.remove("hidden");}
function switchIdentity(){logoutW();}
function previewSponsor(name){COMPANY=name;const chip=$("#modeChip");if(chip)chip.textContent="Industry · "+name;$("#wAv").style.background=coColor(name);go("overview");}

renderLanding();
</script>
